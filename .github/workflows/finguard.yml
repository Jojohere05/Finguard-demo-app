name: FinGuard Security Scan

on:
  push:
    branches: [main]
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Zip repository
        run: zip -r repo.zip . -x ".git/*" "node_modules/*"

      - name: Call FinGuard Backend
        run: |
          curl -X POST "https://https://finguard-backend-1.onrender.com/api/scan" \
          -F "file=@repo.zip" \
          -o result.json

      - name: Show result
        run: cat result.json

      - name: Fail if risky
        run: |
          DECISION=$(jq -r '.decision' result.json)
          if [ "$DECISION" = "BLOCK" ] || [ "$DECISION" = "REVIEW" ]; then
            echo "❌ FinGuard blocked this commit"
            exit 1
          else
            echo "✅ FinGuard passed"
          fi